<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мои заказы</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary-color: #e91e63;
    }

    body {
      background-color: #f8f9fa;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .navbar {
      background: white;
      border-bottom: 1px solid #e9ecef;
    }

    .logo {
      font-weight: 700;
      color: var(--primary-color) !important;
      text-decoration: none;
      font-size: 1.4rem;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .back-link {
      color: #6c757d;
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--primary-color);
    }

    .orders-box,
    .empty-box,
    .auth-box {
      background: white;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 1rem;
    }

    .order-item {
      padding: 1rem 0;
      border-bottom: 1px solid #eeeeee;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .order-product {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 18px;
      padding: 10px 0;
      border-bottom: 1px solid #f1f1f1;
    }

    .order-product:last-child {
      border-bottom: none;
    }

    .order-product > div:first-child {
      flex: 0 1 320px;
    }

    .order-product-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .order-product-meta {
      color: #666;
      margin-bottom: 2px;
    }

    .order-product-image {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #eee;
      display: block;
      flex: 0 0 90px;
    }

    .order-row {
      margin-bottom: 0.25rem;
      color: #555;
    }

    .order-status {
      display: inline-block;
      padding: 0.3rem 0.65rem;
      border-radius: 8px;
      background: #d4edda;
      color: #155724;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .order-status.pending {
      background: #fff3cd;
      color: #856404;
    }

    .order-status.default-status {
      background: #e2e3e5;
      color: #41464b;
    }

    .empty-box,
    .auth-box {
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <nav class="navbar py-3">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
      <a class="logo" href="javascript:void(0);" onclick="return openMainPage(event)">BeautyShop</a>
    </div>
  </nav>

  <div class="container py-4">
    <div class="mb-4">
      <h1 class="page-title">Мои заказы</h1>
      <a href="javascript:void(0);" class="back-link" onclick="return openMainPage(event)">
        ← Назад в каталог
      </a>
    </div>

    <div id="authBox" class="auth-box d-none">
      <h3>Нужна авторизация</h3>
      <p class="text-muted mb-3">Чтобы увидеть историю заказов, сначала войдите в аккаунт.</p>
      <a href="http://localhost:9003/auth.html" class="btn btn-danger">
        Войти
      </a>
    </div>

    <div id="ordersContainer"></div>
  </div>

  <script>
    const API_URL = "http://localhost:9002/api";
    const ordersContainer = document.getElementById("ordersContainer");
    const authBox = document.getElementById("authBox");

    function getToken() {
      return localStorage.getItem("token");
    }

    function getUser() {
      const raw = localStorage.getItem("user");
      if (!raw) return null;

      try {
        return JSON.parse(raw);
      } catch (e) {
        return null;
      }
    }

    function getAuthHeaders(includeJson = false) {
      const token = getToken();
      const headers = {};

      if (includeJson) {
        headers["Content-Type"] = "application/json";
      }

      if (token) {
        headers["Authorization"] = `Bearer ${token}`;
      }

      return headers;
    }

    function syncAuthFromUrl() {
      const params = new URLSearchParams(window.location.search);

      const token = params.get("token");
      const id = params.get("id");
      const name = params.get("name");
      const email = params.get("email");
      const role = params.get("role");

      if (!token) return;

      localStorage.setItem("token", token);
      localStorage.setItem("user", JSON.stringify({
        id: id ? Number(id) : null,
        name: name || "",
        email: email || "",
        role: role || ""
      }));

      const cleanUrl = window.location.origin + window.location.pathname;
      window.history.replaceState({}, document.title, cleanUrl);
    }

    function buildCrossServiceUrl(rawUrl) {
      const token = getToken();
      const user = getUser();

      if (!token || !user) {
        return "http://localhost:9003/auth.html";
      }

      const url = new URL(rawUrl);

      url.searchParams.set("token", token);
      url.searchParams.set("id", String(user.id || ""));
      url.searchParams.set("name", user.name || "");
      url.searchParams.set("email", user.email || "");
      url.searchParams.set("role", user.role || "");

      // защита от открытия старой версии страницы из кэша
      url.searchParams.set("_v", String(Date.now()));

      return url.toString();
    }

    function openMainPage(event) {
      if (event) event.preventDefault();
      window.location.href = buildCrossServiceUrl("http://localhost:9000/main.html");
      return false;
    }

    function openBasketPage(event) {
      if (event) event.preventDefault();
      window.location.href = buildCrossServiceUrl("http://localhost:9001/basket.html");
      return false;
    }

    function showAuthRequired() {
      authBox.classList.remove("d-none");
      ordersContainer.innerHTML = "";
    }

    async function loadOrders() {
      const token = getToken();

      if (!token) {
        showAuthRequired();
        return;
      }

      try {
        const response = await fetch(`${API_URL}/orders`, {
          method: "GET",
          headers: getAuthHeaders()
        });

        if (response.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          showAuthRequired();
          return;
        }

        if (!response.ok) {
          throw new Error("Не удалось загрузить заказы");
        }

        const orders = await response.json();
        renderOrders(orders);
      } catch (error) {
        console.error(error);
        ordersContainer.innerHTML = `
          <div class="empty-box">
            <h3>Ошибка загрузки</h3>
            <p class="text-muted mb-0">Не удалось получить список заказов.</p>
          </div>
        `;
      }
    }

    function resolveImageUrl(url) {
      const value = String(url || "").trim();
      if (!value) return "";

      if (value.startsWith("http://") || value.startsWith("https://")) {
        return value;
      }

      if (value.startsWith("/")) {
        return `http://localhost:9000${value}`;
      }

      return `http://localhost:9000/${value}`;
    }

    function renderOrders(orders) {
      if (!Array.isArray(orders) || !orders.length) {
        ordersContainer.innerHTML = `
          <div class="empty-box">
            <h3>Заказов пока нет</h3>
            <p class="text-muted mb-0">После оформления они появятся здесь.</p>
          </div>
        `;
        return;
      }
      
      function formatDateOnly(value) {
        const date = new Date(value);
        return date.toLocaleDateString("ru-RU");
      }

      ordersContainer.innerHTML = `
        <div class="orders-box">
          ${orders.map(order => `
            <div class="order-item">
              <div class="order-title">Заказ №${order.user_order_number}</div>
              <div class="order-row">Сумма: ${formatPrice(order.total_amount)}</div>
              <div class="order-row">Пункт выдачи: ${escapeHtml(order.pickup_address || "Не указан")}</div>
                <div class="order-row">
                  Дата прибытия: ${order.arrival_date ? formatDateOnly(order.arrival_date) : "Не указано"}
                </div>
                Статус оплаты:
                <span class="order-status ${statusClass(order.payment_status)}">
                  ${statusText(order.payment_status)}
                </span>
              </div>
              <div class="order-row">
                Дата оформления: ${formatDate(order.created_at)}
              </div>

              <div class="mt-3">
                <strong>Состав заказа:</strong>
                ${
                  Array.isArray(order.items) && order.items.length
                    ? `
                      <div class="mt-2">
                        ${order.items.map(item => `
                          <div class="order-product">
                            <div>
                              <div class="order-product-name">${escapeHtml(item.name)}</div>
                              <div class="order-product-meta">Артикул: ${escapeHtml(item.sku)}</div>
                              <div class="order-product-meta">Количество: ${item.qty}</div>
                              <div class="order-product-meta">Цена: ${formatPrice(item.price)}</div>
                            </div>

                            <div>
                              <img
                                src="${escapeHtml(resolveImageUrl(item.image_url))}"
                                alt="${escapeHtml(item.name)}"
                                class="order-product-image"
                              >
                            </div>
                          </div>
                        `).join("")}
                      </div>
                    `
                    : `<div class="text-muted mt-2">Нет товаров</div>`
                }
              </div>
            </div>
          `).join("")}
        </div>
      `;
}

    function statusText(status) {
      const normalized = String(status || "").toLowerCase();

      if (normalized === "pending") return "В ожидании";
      if (normalized === "paid") return "Оплачен";
      return escapeHtml(status || "Неизвестно");
    }

    function statusClass(status) {
      const normalized = String(status || "").toLowerCase();

      if (normalized === "pending") return "pending";
      if (normalized === "paid") return "";
      return "default-status";
    }

    function formatPrice(value) {
      return Number(value || 0).toLocaleString("ru-RU") + " ₽";
    }

    function formatDate(value) {
      const date = new Date(value);
      return date.toLocaleString("ru-RU");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      syncAuthFromUrl();
      await loadOrders();
    });
  </script>
</body>
</html>
