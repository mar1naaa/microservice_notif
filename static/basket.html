<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корзина | BeautyShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <style>
    body {
      font-family: "Montserrat", sans-serif;
      background: linear-gradient(135deg, #fff8fa, #ffeef4);
      color: #3c2530;
      min-height: 100vh;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 30px rgba(190, 98, 129, 0.08);
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 700;
      color: #d63384 !important;
      letter-spacing: 0.04em;
      text-decoration: none;
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #c22573;
      margin-bottom: 8px;
    }

    .page-subtitle {
      color: #7a5b67;
      margin-bottom: 0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #000000;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link:hover {
      color: #b8246e;
    }

    .card-box {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      box-shadow: 0 14px 40px rgba(210, 124, 154, 0.12);
      border: none;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid rgba(212, 128, 157, 0.15);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-image {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 18px;
      background: #fff;
    }

    .item-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #4a2d38;
      margin-bottom: 8px;
    }

    .item-meta {
      color: #7c5f69;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .qty-box {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(214, 51, 132, 0.2);
      background: #fff;
    }

    .qty-btn {
      border: none;
      background: transparent;
      width: 38px;
      height: 38px;
      font-weight: 700;
      color: #d63384;
    }

    .qty-btn:hover {
      background: #fff0f6;
    }

    .qty-value {
      width: 42px;
      text-align: center;
      font-weight: 600;
      color: #4a2d38;
    }

    .item-right {
      text-align: right;
      min-width: 150px;
    }

    .item-sum {
      font-size: 1.08rem;
      font-weight: 700;
      color: #c22573;
      margin-bottom: 10px;
    }

    .remove-btn {
      border: none;
      background: transparent;
      color: #a15b74;
      font-weight: 600;
    }

    .remove-btn:hover {
      color: #d63384;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: #5f404d;
    }

    .summary-row strong {
      color: #3f2530;
    }

    .total-row {
      font-size: 1.1rem;
      font-weight: 700;
      color: #c22573;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(212, 128, 157, 0.18);
    }

    .action-btn {
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 600;
    }

    .btn-main {
      background: linear-gradient(135deg, #ff5ca8, #d63384);
      color: #fff;
      border: none;
    }

    .btn-main:hover {
      background: linear-gradient(135deg, #f14f9c, #be2f74);
      color: #fff;
    }

    .empty-box,
    .auth-box {
      text-align: center;
      padding: 40px 20px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 28px rgba(180, 100, 133, 0.1);
    }

    @media (max-width: 768px) {
      .cart-item {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .item-image {
        margin: 0 auto;
      }

      .item-right {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar py-3">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
      <a class="logo" href="javascript:void(0);" onclick="return openMainPage(event)">BeautyShop</a>

      <div class="d-flex align-items-center gap-3 flex-wrap">
        <a class="back-link" href="javascript:void(0);" onclick="return openMainPage(event)">
          Назад в каталог
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="mb-4">
      <h1 class="page-title">Корзина</h1>
    </div>

    <div id="authRequired" class="auth-box d-none">
      <h3 class="mb-3">Нужна авторизация</h3>
      <p class="text-muted mb-4">Чтобы открыть корзину, сначала войдите в аккаунт.</p>
      <a href="http://localhost:9003/auth.html" class="btn btn-main action-btn">
        Войти
      </a>
    </div>

    <div id="basketContent" class="row g-4 d-none">
      <div class="col-lg-8">
        <div class="card-box p-4">
          <div id="cartItemsWrap"></div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card-box p-4">
          <h4 class="mb-4">Итог</h4>

          <div class="summary-row">
            <span>Количество товаров</span>
            <strong id="totalQty">0</strong>
          </div>

          <div class="summary-row">
            <span>Сумма</span>
            <strong id="totalPrice">0 ₽</strong>
          </div>

          <div class="summary-row total-row">
            <span>К оплате</span>
            <strong id="payPrice">0 ₽</strong>
          </div>

          <div class="d-grid gap-2 mt-4">
            <button id="orderBtn" class="btn btn-main action-btn">
              Оформить заказ
            </button>
            <button id="clearBtn" class="btn btn-outline-secondary action-btn">
              Очистить корзину
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const CART_API = "http://localhost:9001/api";
    const ORDERS_API = "http://localhost:9002/api/orders";

    const authRequired = document.getElementById("authRequired");
    const basketContent = document.getElementById("basketContent");
    const cartItemsWrap = document.getElementById("cartItemsWrap");
    const totalQtyEl = document.getElementById("totalQty");
    const totalPriceEl = document.getElementById("totalPrice");
    const payPriceEl = document.getElementById("payPrice");
    const clearBtn = document.getElementById("clearBtn");
    const orderBtn = document.getElementById("orderBtn");

    let currentCart = {
      items: [],
      total_qty: 0,
      total_price: 0
    };

    function getToken() {
      return localStorage.getItem("token");
    }

    function getUser() {
      const raw = localStorage.getItem("user");
      if (!raw) return null;

      try {
        return JSON.parse(raw);
      } catch (e) {
        return null;
      }
    }

    function getAuthHeaders(includeJson = false) {
      const token = getToken();
      const headers = {};

      if (includeJson) {
        headers["Content-Type"] = "application/json";
      }

      if (token) {
        headers["Authorization"] = `Bearer ${token}`;
      }

      return headers;
    }

    function syncAuthFromUrl() {
      const params = new URLSearchParams(window.location.search);

      const token = params.get("token");
      const id = params.get("id");
      const name = params.get("name");
      const email = params.get("email");
      const role = params.get("role");

      if (!token) return;

      localStorage.setItem("token", token);
      localStorage.setItem("user", JSON.stringify({
        id: id ? Number(id) : null,
        name: name || "",
        email: email || "",
        role: role || ""
      }));

      const cleanUrl = window.location.origin + window.location.pathname;
      window.history.replaceState({}, document.title, cleanUrl);
    }

    function buildCrossServiceUrl(baseUrl) {
      const token = getToken();
      const user = getUser();

      if (!token || !user) {
        return "http://localhost:9003/auth.html";
      }

      const params = new URLSearchParams({
        token: token,
        id: String(user.id || ""),
        name: user.name || "",
        email: user.email || "",
        role: user.role || ""
      });

      return `${baseUrl}?${params.toString()}`;
    }

    function openMainPage(event) {
      if (event) event.preventDefault();
      window.location.href = buildCrossServiceUrl("http://localhost:9000/main.html");
      return false;
    }

    function openOrdersPage(event) {
      if (event) event.preventDefault();
      window.location.href = buildCrossServiceUrl("http://localhost:9002/orders.html");
      return false;
    }

    function formatPrice(value) {
      return Number(value || 0).toLocaleString("ru-RU") + " ₽";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function showAuthRequired() {
      authRequired.classList.remove("d-none");
      basketContent.classList.add("d-none");
    }

    function showBasketContent() {
      authRequired.classList.add("d-none");
      basketContent.classList.remove("d-none");
    }

    async function loadCart() {
      const token = getToken();

      if (!token) {
        showAuthRequired();
        return;
      }

      try {
        const response = await fetch(`${CART_API}/cart`, {
          method: "GET",
          headers: getAuthHeaders()
        });

        if (response.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          showAuthRequired();
          return;
        }

        if (!response.ok) {
          throw new Error("Не удалось загрузить корзину");
        }

        const data = await response.json();
        currentCart = data;

        showBasketContent();
        renderCart(data);
      } catch (error) {
        console.error("loadCart error:", error);
        cartItemsWrap.innerHTML = `
          <div class="empty-box">
            <h3 class="mb-2">Ошибка загрузки</h3>
            <p class="text-muted mb-0">Не удалось получить данные корзины.</p>
          </div>
        `;
      }
    }

    function renderCart(data) {
  const items = data.items || [];
  const totalQty = data.total_qty || 0;
  const totalPrice = data.total_price || 0;

  totalQtyEl.textContent = totalQty;
  totalPriceEl.textContent = formatPrice(totalPrice);
  payPriceEl.textContent = formatPrice(totalPrice);

  if (!items.length) {
    cartItemsWrap.innerHTML = `
      <div class="empty-box">
        <h3 class="mb-2">Корзина пуста</h3>
        <p class="text-muted mb-0">Добавьте товары из каталога.</p>
      </div>
    `;
    return;
  }

  cartItemsWrap.innerHTML = items.map(item => `
    <div class="cart-item">
      <div>
        <img
          src="${escapeHtml(item.image_url || "")}"
          alt="${escapeHtml(item.name)}"
          class="item-image"
        >
      </div>

      <div>
        <div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-meta">Артикул: ${escapeHtml(item.sku)}</div>

        <div class="qty-box">
          <button class="qty-btn qty-minus" data-sku="${escapeHtml(item.sku)}" data-qty="${item.qty - 1}">−</button>
          <div class="qty-value">${item.qty}</div>
          <button class="qty-btn qty-plus" data-sku="${escapeHtml(item.sku)}" data-qty="${item.qty + 1}">+</button>
        </div>
      </div>

      <div class="item-right">
        <div class="item-sum">${formatPrice(item.sum)}</div>
        <button class="remove-btn remove-item-btn" data-sku="${escapeHtml(item.sku)}">
          Удалить
        </button>
      </div>
    </div>
  `).join("");

  cartItemsWrap.querySelectorAll(".qty-minus, .qty-plus").forEach(button => {
    button.addEventListener("click", () => {
      const sku = button.dataset.sku;
      const qty = Number(button.dataset.qty);
      changeQty(sku, qty);
    });
  });

  cartItemsWrap.querySelectorAll(".remove-item-btn").forEach(button => {
    button.addEventListener("click", () => {
      const sku = button.dataset.sku;
      removeItem(sku);
    });
  });
}

    async function changeQty(sku, qty) {
      const token = getToken();
      if (!token) {
        showAuthRequired();
        return;
      }

      try {
        const response = await fetch(`${CART_API}/update`, {
          method: "POST",
          headers: getAuthHeaders(true),
          body: JSON.stringify({ sku, qty })
        });

        if (response.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          showAuthRequired();
          return;
        }

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Не удалось обновить количество");
        }

        await loadCart();
      } catch (error) {
        console.error("changeQty error:", error);
        alert("Ошибка: " + error.message);
      }
    }

    async function removeItem(sku) {
      const token = getToken();
      if (!token) {
        showAuthRequired();
        return;
      }

      try {
        const response = await fetch(`${CART_API}/remove?sku=${encodeURIComponent(sku)}`, {
          method: "DELETE",
          headers: getAuthHeaders()
        });

        if (response.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          showAuthRequired();
          return;
        }

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Не удалось удалить товар");
        }

        await loadCart();
      } catch (error) {
        console.error("removeItem error:", error);
        alert("Ошибка: " + error.message);
      }
    }

    async function clearCart() {
      const token = getToken();
      if (!token) {
        showAuthRequired();
        return;
      }

      try {
        const response = await fetch(`${CART_API}/clear`, {
          method: "POST",
          headers: getAuthHeaders()
        });

        if (response.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          showAuthRequired();
          return;
        }

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Не удалось очистить корзину");
        }

        currentCart = { items: [], total_qty: 0, total_price: 0 };
        await loadCart();
      } catch (error) {
        console.error("clearCart error:", error);
        alert("Ошибка: " + error.message);
      }
    }

    async function createOrder() {
      const token = getToken();
      if (!token) {
        showAuthRequired();
        return;
      }

      const totalAmount = Number(currentCart.total_price || 0);

      if (totalAmount <= 0) {
        alert("Корзина пуста.");
        return;
      }

      orderBtn.disabled = true;
      orderBtn.textContent = "Оформляем...";

      try {
        const response = await fetch(`${ORDERS_API}/create`, {
          method: "POST",
          headers: getAuthHeaders(true),
          body: JSON.stringify({
            total_amount: totalAmount
          })
        });

        if (response.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          showAuthRequired();
          return;
        }

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Не удалось оформить заказ");
        }

        const order = await response.json();

        const clearResponse = await fetch(`${CART_API}/clear`, {
          method: "POST",
          headers: getAuthHeaders()
        });

        if (!clearResponse.ok && clearResponse.status !== 401) {
          console.warn("Корзина не очистилась автоматически");
        }

        window.location.href = buildCrossServiceUrl("http://localhost:9002/orders.html");
      } catch (error) {
        console.error("createOrder error:", error);
        alert("Ошибка оформления заказа: " + error.message);
      } finally {
        orderBtn.disabled = false;
        orderBtn.textContent = "Оформить заказ";
      }
    }

    clearBtn.addEventListener("click", clearCart);
    orderBtn.addEventListener("click", createOrder);

    window.changeQty = changeQty;
    window.removeItem = removeItem;

    document.addEventListener("DOMContentLoaded", async () => {
      syncAuthFromUrl();
      await loadCart();
    });
  </script>
</body>
</html>
