<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корзина</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary-color: #e91e63;
    }

    body {
      background-color: #f8f9fa;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .navbar {
      background: white;
      border-bottom: 1px solid #e9ecef;
    }

    .logo {
      font-weight: 700;
      color: var(--primary-color) !important;
      text-decoration: none;
      font-size: 1.4rem;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .back-link {
      color: #6c757d;
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--primary-color);
    }

    .cart-box,
    .summary-box,
    .empty-box {
      background: white;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 1rem;
    }

    .cart-item {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid #eeeeee;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      background: #f1f1f1;
      border: 1px solid #eee;
      flex-shrink: 0;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .cart-item-meta {
      font-size: 0.9rem;
      color: #6c757d;
      margin-bottom: 0.25rem;
    }

    .cart-item-price {
      color: var(--primary-color);
      font-weight: 700;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .qty-controls button {
      width: 32px;
      height: 32px;
      border: 1px solid #ced4da;
      background: white;
      border-radius: 6px;
    }

    .qty-value {
      min-width: 24px;
      text-align: center;
      font-weight: 700;
    }

    .cart-item-right {
      min-width: 110px;
      text-align: right;
    }

    .cart-item-sum {
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .remove-btn {
      border: none;
      background: none;
      color: #dc3545;
      font-size: 0.9rem;
      padding: 0;
    }

    .summary-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .summary-row,
    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .summary-total {
      border-top: 1px solid #eee;
      padding-top: 0.75rem;
      margin-top: 0.75rem;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .checkout-btn {
      width: 100%;
      padding: 0.95rem 1rem;
      border: none;
      border-radius: 8px;
      background: #dc3545;
      color: white;
      font-weight: 700;
      margin-top: 1rem;
    }

    .checkout-btn:hover {
      background: #c82333;
    }

    .checkout-btn:disabled {
      background: #bdbdbd;
      cursor: not-allowed;
    }

    .empty-box {
      text-align: center;
      padding: 2rem;
    }

    @media (max-width: 768px) {
      .cart-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .cart-item-right {
        text-align: left;
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar py-3">
    <div class="container">
      <a class="logo" href="http://localhost:9000/main.html">BeautyShop</a>
    </div>
  </nav>

  <div class="container py-4">
    <div class="mb-4">
      <h1 class="page-title">Корзина</h1>
      <a href="http://localhost:9000/main.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Назад в каталог
      </a>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div id="cartContainer"></div>
      </div>

      <div class="col-lg-4">
        <div class="summary-box">
          <div class="summary-title">Итог</div>

          <div class="summary-row">
            <span>Количество товаров</span>
            <span id="totalQty">0</span>
          </div>

          <div class="summary-row">
            <span>Сумма</span>
            <span id="totalPrice">0 ₽</span>
          </div>

          <div class="summary-total">
            <span>К оплате</span>
            <span id="finalPrice">0 ₽</span>
          </div>

          <button id="checkoutBtn" class="checkout-btn">Оформить заказ</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:9001/api";
    const ORDER_API_URL = "http://localhost:9002/api";

    const cartContainer = document.getElementById("cartContainer");
    const totalQtyEl = document.getElementById("totalQty");
    const totalPriceEl = document.getElementById("totalPrice");
    const finalPriceEl = document.getElementById("finalPrice");
    const checkoutBtn = document.getElementById("checkoutBtn");

    let currentTotalPrice = 0;

    async function loadCart() {
      try {
        const response = await fetch(`${API_URL}/cart`);
        if (!response.ok) {
          throw new Error("Не удалось загрузить корзину");
        }

        const data = await response.json();
        renderCart(data);
      } catch (error) {
        console.error(error);
        cartContainer.innerHTML = `
          <div class="empty-box">
            <h3>Ошибка загрузки</h3>
            <p class="text-muted mb-0">Не удалось получить содержимое корзины.</p>
          </div>
        `;
      }
    }

    function renderCart(data) {
      const items = data.items || [];
      const totalQty = data.total_qty || 0;
      const totalPrice = data.total_price || 0;

      currentTotalPrice = totalPrice;

      totalQtyEl.textContent = totalQty;
      totalPriceEl.textContent = formatPrice(totalPrice);
      finalPriceEl.textContent = formatPrice(totalPrice);

      if (!items.length) {
        cartContainer.innerHTML = `
          <div class="empty-box">
            <h3>Корзина пуста</h3>
            <p class="text-muted mb-0">Добавь товары из каталога.</p>
          </div>
        `;
        checkoutBtn.disabled = true;
        return;
      }

      checkoutBtn.disabled = false;

      cartContainer.innerHTML = `
        <div class="cart-box">
          ${items.map(item => `
            <div class="cart-item">
              <img
                src="${escapeHtml(item.image_url || "")}"
                alt="${escapeHtml(item.name || "")}"
                class="cart-item-image"
              >

              <div class="cart-item-info">
                <div class="cart-item-title">${escapeHtml(item.name || "Без названия")}</div>
                <div class="cart-item-meta">Артикул: ${escapeHtml(item.sku || "")}</div>
                <div class="cart-item-price">${formatPrice(item.price)}</div>

                <div class="qty-controls">
                  <button onclick="changeQty('${escapeJs(item.sku)}', ${item.qty - 1})">−</button>
                  <div class="qty-value">${item.qty}</div>
                  <button onclick="changeQty('${escapeJs(item.sku)}', ${item.qty + 1})">+</button>
                </div>
              </div>

              <div class="cart-item-right">
                <div class="cart-item-sum">${formatPrice(item.sum)}</div>
                <button class="remove-btn" onclick="removeItem('${escapeJs(item.sku)}')">
                  Удалить
                </button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    async function changeQty(sku, qty) {
      try {
        const response = await fetch(`${API_URL}/update`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ sku, qty })
        });

        if (!response.ok) {
          throw new Error("Не удалось обновить количество");
        }

        await loadCart();
      } catch (error) {
        console.error(error);
        alert(error.message);
      }
    }

    async function removeItem(sku) {
      try {
        const response = await fetch(`${API_URL}/remove?sku=${encodeURIComponent(sku)}`, {
          method: "DELETE"
        });

        if (!response.ok) {
          throw new Error("Не удалось удалить товар");
        }

        await loadCart();
      } catch (error) {
        console.error(error);
        alert(error.message);
      }
    }

    async function checkout() {
      try {
        if (currentTotalPrice <= 0) {
          alert("Корзина пуста");
          return;
        }

        checkoutBtn.disabled = true;

        const orderResponse = await fetch(`${ORDER_API_URL}/orders/create`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: 1,
            total_amount: currentTotalPrice
          })
        });

        if (!orderResponse.ok) {
          throw new Error("Не удалось оформить заказ");
        }

        const order = await orderResponse.json();

        const clearResponse = await fetch(`${API_URL}/clear`, {
          method: "POST"
        });

        if (!clearResponse.ok) {
          throw new Error("Заказ создан, но корзину очистить не удалось");
        }

      window.location.href = `http://localhost:9002/orders.html?order_id=${order.id}`;
      } catch (error) {
        console.error(error);
        alert(error.message);
      } finally {
        checkoutBtn.disabled = false;
      }
    }

    function formatPrice(value) {
      return Number(value || 0).toLocaleString("ru-RU") + " ₽";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeJs(str) {
      return String(str || "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }

    checkoutBtn.addEventListener("click", checkout);
    document.addEventListener("DOMContentLoaded", loadCart);
  </script>
</body>
</html>
